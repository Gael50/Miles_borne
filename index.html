<style>
:root {
    /* --ui-scale est conserve a 1 : le scaling visuel global passe maintenant par
       transform:scale(var(--effective-scale)) sur .game-scene (voir plus bas).
       Les variables ci-dessous restent en pixels LOGIQUES (la scene fait sceneW × sceneH
       logiques, projetes par transform). Cela garantit que :
         - les hitboxes restent alignees au pixel pres (le navigateur scale les hitboxes
           avec transform: scale, pas d'approximation),
         - la resolution simulee est independante de l'ecran reel,
         - aucun rognage n'est possible : effectiveScale = min(userZoom, autoFitScale). */
    --ui-scale: 1;
    /* Scene & scaling pilotes par JS (cf. App) */
    --scene-w: 100vw;
    --scene-h: 100vh;
    --effective-scale: 1;
    /* Cartes — amplifiees 2026-05-18 : +14% pour plus d'impact et lisibilite */
    --c-w: calc(100px * var(--ui-scale));
    --c-h: calc(144px * var(--ui-scale));
    /* Fonts — hierarchie remontee +20-30% : tout est visiblement plus lisible */
    --f-xs: calc(13px * var(--ui-scale));
    --f-sm: calc(15px * var(--ui-scale));
    --f-md: calc(17px * var(--ui-scale));
    --f-lg: calc(21px * var(--ui-scale));
    --f-xl: calc(28px * var(--ui-scale));
    --f-xxl: calc(36px * var(--ui-scale));
    --f-display: calc(54px * var(--ui-scale));
    /* Espacements */
    --sp-xs: calc(4px * var(--ui-scale));
    --sp-sm: calc(8px * var(--ui-scale));
    --sp-md: calc(12px * var(--ui-scale));
    --sp-lg: calc(18px * var(--ui-scale));
    --sp-xl: calc(28px * var(--ui-scale));
    /* Rayons / largeurs cle */
    --rad-sm: calc(8px * var(--ui-scale));
    --rad-md: calc(12px * var(--ui-scale));
    --rad-lg: calc(18px * var(--ui-scale));
    /* Compaction passe 2026-05 : top-bar 56→48, sidebar 300→280, panel-pad 16→12 */
    --topbar-h: calc(48px * var(--ui-scale));
    --sidebar-w: calc(280px * var(--ui-scale));
    --panel-pad: calc(12px * var(--ui-scale));
    --btn-pad: calc(10px * var(--ui-scale)) calc(20px * var(--ui-scale));
    /* ─── HIERARCHIE Z-INDEX (P3 refactor 2026-05-18) ───
       Plus le z est haut, plus l'element prime visuellement.
       Aucun overlay ne masque une modale critique. */
    --z-ui-base: 1;
    --z-ui-panel: 10;
    --z-topbar: 100;
    --z-status-toast: 3000;       /* toast haut, le plus bas des overlays */
    --z-flash: 4000;              /* banner flash centre */
    --z-cardfx: 4500;             /* animation carte jouee */
    --z-event-popup: 6000;        /* shop, event, troc */
    --z-pass-screen: 6500;        /* "Au tour du joueur" */
    --z-win-screen: 7000;         /* victoire */
    --z-settings: 8000;           /* reglages */
    --z-exit-confirm: 9000;       /* confirmation Echap */
    --z-tooltip: 9600;            /* tooltips custom au-dessus des panneaux et overlays */
    --safe-top: max(8px, env(safe-area-inset-top, 0px));
}
*{box-sizing:border-box;margin:0;padding:0;}
html, body { width: 100%; height: 100%; overflow: hidden; background:#040b1a; font-family: 'Orbitron', sans-serif; user-select:none; -webkit-user-select:none; }
#root { position:fixed; inset:0; overflow:hidden; }

/* ─── SYSTEME DE RESOLUTION SIMULEE + AUTO-FIT ───────────────
   .game-viewport = surface reelle du navigateur (full screen, clipping garanti).
   .game-scene    = scene logique aux dimensions choisies (sceneW × sceneH), centree,
                    scaled UNIFORMEMENT par var(--effective-scale).
   Resultat : la scene est rendue dans ses propres pixels logiques (le layout est
   stable, pense pour ces dimensions), puis projetee dans le viewport reel.
   Aucun rognage n'est possible : effectiveScale = min(userZoom, autoFit) garantit
   que la scene tient toujours dans le viewport. Les hitboxes (clic, hover, drag,
   drop) sont scaled par le navigateur en meme temps que les pixels visuels — pas
   d'approximation, alignement parfait. */
.game-viewport {
    position: fixed;
    inset: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #040b1a;
    /* Les bandes noires autour de la scene apparaissent automatiquement quand
       l'aspect-ratio du viewport et de la scene different (ex: scene smartphone
       portrait sur ecran desktop = bandes laterales noires). C'est intentionnel
       et garantit l'absence de rognage. */
}
.game-scene {
    width: var(--scene-w);
    height: var(--scene-h);
    transform: scale(var(--effective-scale));
    transform-origin: center center;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: #040b1a;
    will-change: transform;
    padding-top: var(--safe-top);
}
/* Tout enfant direct de la scene doit pouvoir shrinker sans casser le layout */
.game-scene > * { min-width: 0; max-width: 100%; }
/* Compat retro : si du code ancien reference encore game-stage, on l'aliase */
.game-stage { width: 100%; height: 100%; overflow: hidden; display: flex; flex-direction: column; position: relative; }
.game-stage > * { min-width: 0; max-width: 100%; }

.anim-card-draw { animation: cardDraw .55s cubic-bezier(0.34,1.56,0.64,1) both; }

@keyframes cardFxIn{0%{transform:translate(-50%,-50%) scale(0.3) rotate(-15deg);opacity:0;filter:blur(12px);}55%{transform:translate(-50%,-50%) scale(1.3) rotate(3deg);opacity:1;filter:blur(0);}80%{transform:translate(-50%,-50%) scale(1.15) rotate(-1deg);opacity:1;}100%{transform:translate(-50%,-50%) scale(1.2) rotate(0);opacity:1;}}

.card-fx-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: var(--z-cardfx);
    display: flex;
    align-items: center;
    justify-content: center;
}
.card-fx-card {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    animation: cardFxIn .5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    will-change: transform, opacity;
}
.card-fx-card.leaving {
    animation: cardFxOut .5s cubic-bezier(.4,0,1,1) both;
}
.card-fx-halo {
    position: absolute;
    width: calc(280px * var(--ui-scale));
    height: calc(280px * var(--ui-scale));
    border-radius: 50%;
    pointer-events: none;
    animation: haloPulse 2.5s ease-in-out infinite;
    z-index: -1;
}
.card-fx-badge {
    position: absolute;
    top: calc(100% + 14px * var(--ui-scale));
    left: 50%;
    transform: translateX(-50%);
    padding: var(--sp-xs) var(--sp-md);
    border-radius: 99px;
    font-size: var(--f-md);
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
    animation: badgeIn .35s .15s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}
.card-fx-target {
    position: absolute;
    bottom: calc(100% + 12px * var(--ui-scale));
    left: 50%;
    transform: translateX(-50%);
    padding: calc(4px * var(--ui-scale)) var(--sp-md);
    border-radius: 99px;
    font-size: var(--f-sm);
    font-weight: 700;
    background: rgba(0,0,0,0.7);
    color: #fbbf24;
    border: 1px solid rgba(251,191,36,0.4);
    white-space: nowrap;
    animation: badgeIn .3s .1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

/* ─── MENU REDESIGN 2026-05-18 ───────────────────────────────
   Motion design : respiration logo, flottement icone, pulse CTA principal,
   shimmer hover sur les tuiles, cascade reveal a l'arrivee.
   Toutes les animations respectent prefers-reduced-motion (voir bas du fichier). */
@keyframes menu-glow-breathe {
    0%,100% { filter: drop-shadow(0 0 24px currentColor); }
    50%     { filter: drop-shadow(0 0 56px currentColor) drop-shadow(0 0 18px currentColor); }
}
@keyframes menu-logo-float {
    0%,100% { transform: translateY(0) rotate(-1deg); }
    50%     { transform: translateY(-6px) rotate(2deg); }
}
@keyframes menu-cta-pulse {
    0%,100% { box-shadow: 0 0 0 0 currentColor, 0 12px 32px rgba(0,0,0,0.4); }
    50%     { box-shadow: 0 0 36px 4px currentColor, 0 18px 44px rgba(0,0,0,0.45); }
}
@keyframes menu-tile-shimmer {
    0%   { transform: translateX(-130%) skewX(-18deg); }
    100% { transform: translateX(360%)  skewX(-18deg); }
}
@keyframes menu-entrance-up {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
}
@keyframes menu-entrance-left {
    from { opacity: 0; transform: translateX(-30px); }
    to   { opacity: 1; transform: translateX(0); }
}
@keyframes menu-title-reveal {
    0%   { opacity: 0; transform: translateY(-10px) scale(0.92); letter-spacing: 0; }
    100% { opacity: 1; transform: translateY(0) scale(1); letter-spacing: 3px; }
}
@keyframes menu-glow-ring {
    0%,100% { opacity: 0.4; transform: scale(1); }
    50%     { opacity: 0.8; transform: scale(1.08); }
}

/* Logo principal */
.menu-logo {
    text-align: center;
    margin-bottom: var(--sp-sm);
    position: relative;
}
.menu-logo-icon {
    font-size: calc(78px * var(--ui-scale));
    display: inline-block;
    animation: menu-logo-float 3.6s ease-in-out infinite;
    color: currentColor;
    line-height: 1;
}
.menu-logo-halo {
    position: absolute;
    left: 50%;
    top: calc(20px * var(--ui-scale));
    transform: translateX(-50%);
    width: calc(120px * var(--ui-scale));
    height: calc(120px * var(--ui-scale));
    border-radius: 50%;
    pointer-events: none;
    animation: menu-glow-ring 3.6s ease-in-out infinite;
    z-index: 0;
}
.menu-logo-title {
    font-size: var(--f-xxl);
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: var(--sp-sm);
    line-height: 1.05;
    animation: menu-title-reveal .8s cubic-bezier(0.22, 1, 0.36, 1) both;
}
.menu-logo-sub {
    margin-top: var(--sp-xs);
    font-size: var(--f-xs);
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.7;
}

/* CTA principal SOLO : pulse glow respirant */
.menu-cta-primary {
    position: relative;
    animation: menu-cta-pulse 3s ease-in-out infinite;
    will-change: box-shadow;
    overflow: hidden;
}
.menu-cta-primary::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.28), transparent);
    transform: skewX(-18deg);
    animation: menu-tile-shimmer 4.5s ease-in-out infinite;
    pointer-events: none;
}
/* CTA secondaire MULTI : pas de pulse, juste shimmer plus lent */
.menu-cta-secondary {
    position: relative;
    overflow: hidden;
}
.menu-cta-secondary::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 50%; height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.14), transparent);
    transform: skewX(-18deg);
    animation: menu-tile-shimmer 7s ease-in-out infinite;
    animation-delay: 1.5s;
    pointer-events: none;
}

/* Cascade reveal pour les sections (animation-delay applique en JSX) */
.menu-section-up   { animation: menu-entrance-up   .55s cubic-bezier(0.22, 1, 0.36, 1) both; }
.menu-section-left { animation: menu-entrance-left .55s cubic-bezier(0.22, 1, 0.36, 1) both; }

/* Tuiles thèmes : hover premium (shimmer + scale + icon rotate) */
.menu-tile {
    position: relative;
    overflow: hidden;
    will-change: transform, box-shadow;
}
.menu-tile::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 40%; height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.20), transparent);
    transform: skewX(-18deg);
    pointer-events: none;
    transition: transform 0s; /* desactive jusqu'au hover */
}
.menu-tile:hover::after { animation: menu-tile-shimmer .9s ease-out; }
.menu-tile:hover { transform: translateY(-4px) scale(1.04); }
.menu-tile-icon { transition: transform .45s cubic-bezier(0.34, 1.56, 0.64, 1); display: inline-block; }
.menu-tile:hover .menu-tile-icon { transform: scale(1.18) rotate(4deg); }

/* Separateur visuel entre sections du panneau de droite */
.menu-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    margin: var(--sp-lg) 0;
    position: relative;
}
.menu-divider::before {
    content: '◆';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: var(--menu-bg, #040b1a);
    color: currentColor;
    padding: 0 var(--sp-sm);
    font-size: var(--f-sm);
    opacity: 0.6;
}

/* Boutons sidebar tertiaires (Scores / Règles / Crédits / Réglages) */
.menu-sidebar-btn {
    width: 100%;
    padding: var(--sp-sm) var(--sp-md);
    border-radius: var(--rad-md);
    font-family: inherit;
    font-size: var(--f-sm);
    font-weight: 700;
    letter-spacing: 1.5px;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: var(--sp-sm);
    transition: background .2s, border-color .2s, transform .15s, color .2s;
    background: rgba(4,8,20,0.7);
    border: 1px solid rgba(255,255,255,0.06);
    color: #cbd5e1;
}
.menu-sidebar-btn:hover {
    background: rgba(15,23,42,0.92);
    border-color: rgba(255,255,255,0.18);
    transform: translateX(4px);
    color: #fff;
}
.menu-sidebar-btn .icon { width: calc(20px * var(--ui-scale)); display: inline-flex; justify-content: center; font-size: var(--f-md); flex-shrink: 0; }

/* Respect prefers-reduced-motion : on coupe les animations infinies (logo float, pulse, shimmer)
   et on garde uniquement les animations one-shot d'entree (cascade reveal) qui restent essentielles. */
@media (prefers-reduced-motion: reduce) {
    .menu-logo-icon,
    .menu-logo-halo,
    .menu-cta-primary,
    .menu-cta-primary::after,
    .menu-cta-secondary::after,
    .menu-tile::after {
        animation: none !important;
    }
    .menu-tile:hover { transform: translateY(-2px) scale(1.02); }
    .menu-tile:hover .menu-tile-icon { transform: scale(1.08); }
}

/* ─── REFONTE PROFONDE 2026-05 : cartes superposees (style Interface_GAME.html) ─── */
/* La pile de cartes (main joueur) : margin negatif scalable, hover qui sort la carte */
.hand-stack {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;

/* Bouton DEMARRER pleine largeur premium */

    left: -100%;

.minimap-avatar { position:absolute; top:15%; font-size:var(--f-xl); transition:left 1.2s cubic-bezier(0.34, 1.56, 0.64, 1), transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1); filter:drop-shadow(0 4px 6px rgba(0,0,0,0.8)); transform:translateX(-50%); z-index:2; }
.minimap-avatar.bouncing { animation: vBounce 0.6s ease-in-out infinite; }
.minimap-finish { position:absolute; right:15px; top:15%; font-size:calc(26px * var(--ui-scale)); animation: pls 2s infinite; filter:drop-shadow(0 0 12px #fbbf24);}
.minimap-bg-stars {position:absolute; inset:0; opacity:0.1; background-image: radial-gradient(#fff 1.5px, transparent 1.5px); background-size: 25px 25px;}
.mystery-token { position:absolute; top:18%; font-size:var(--f-xl); animation: pop 0.5s ease-out both; filter:drop-shadow(0 0 10px #fbbf24); z-index:1; transform:translateX(-50%); pointer-events:none;}
.mystery-token-label { position:absolute; top:calc(100% + 2px); left:50%; transform:translateX(-50%); font-size:9px; font-weight:900; color:#fbbf24; white-space:nowrap; text-shadow:0 0 4px #000; letter-spacing:1px;}

.tooltip-box { background: rgba(0,0,0,0.88); border: 1px solid rgba(255,255,255,0.14); border-radius: 12px; padding: 14px 18px; color: #f1f5f9; font-size: var(--f-md); text-align: center; min-height:calc(48px * var(--ui-scale)); display:flex; align-items:center; justify-content:center; letter-spacing: 0.3px; line-height: 1.45; font-weight: 700;}
.shop-card { background: rgba(15,23,42,0.92); border: 2px solid #3b82f6; border-radius: 16px; padding: 18px 14px; cursor: pointer; transition: all 0.2s; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; width:calc(170px * var(--ui-scale)); min-height:calc(180px * var(--ui-scale)); text-align:center;}
.shop-card:hover { transform: scale(1.05); background: rgba(30,58,138,0.95); box-shadow: 0 0 20px rgba(59,130,246,0.6);}
.shop-card.disabled { cursor:not-allowed; opacity:0.55; filter:grayscale(0.7); }
.shop-card.disabled:hover { transform:none; box-shadow:none; }
.shop-price { background: #fbbf24; color: #000; padding: 4px 12px; border-radius: 99px; font-weight: 900; font-size: var(--f-sm); }
.shop-name { color:#fff; font-weight:800; font-size:var(--f-md); line-height:1.2; }
.shop-desc { color:#bfdbfe; font-size:var(--f-xs); font-weight:600; line-height:1.4; opacity:0.92; }
.inventory-zone { background:rgba(0,0,0,0.45); border-radius:var(--rad-md); padding:var(--sp-xs) var(--sp-sm); border:2px dashed rgba(255,191,36,0.4); display:flex; gap:var(--sp-sm); align-items:center; min-height:calc(86px * var(--ui-scale)); overflow-x:auto; margin-top:var(--sp-xs);}
.inventory-zone.empty { border-color:rgba(255,255,255,0.12); }
.settings-modal { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index: var(--z-settings); padding:20px; backdrop-filter:blur(8px); }
.settings-panel { background:linear-gradient(135deg,#0f172a,#1e293b); border:1px solid rgba(255,255,255,0.12); border-radius:20px; padding:28px 30px; width:100%; max-width:480px; box-shadow:0 30px 80px rgba(0,0,0,0.6); animation: zin .3s both; }
.settings-title { font-size:var(--f-xl); font-weight:900; color:#fff; letter-spacing:3px; text-transform:uppercase; margin-bottom:6px; }
.settings-sub { font-size:var(--f-sm); color:#94a3b8; margin-bottom:22px; }
.settings-row { display:flex; flex-direction:column; gap:8px; margin-bottom:22px; }
.settings-row label { font-size:var(--f-sm); color:#cbd5e1; font-weight:700; text-transform:uppercase; letter-spacing:2px; display:flex; justify-content:space-between; align-items:center; }
.settings-row label .val { color:#fbbf24; font-size:var(--f-md); }
.settings-presets { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:8px; }
.settings-presets button { background:rgba(15,23,42,0.8); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:8px 6px; color:#cbd5e1; font-size:var(--f-sm); font-weight:700; cursor:pointer; font-family:inherit; transition:all .2s; }
.settings-presets button.active { background:linear-gradient(135deg,#3b82f6,#6366f1); color:#fff; border-color:#3b82f6; }
.settings-presets button:hover { background:rgba(30,58,138,0.6); }
.settings-close { background:linear-gradient(135deg,#3b82f6,#6366f1); border:none; border-radius:12px; padding:14px 22px; color:#fff; font-weight:800; font-size:var(--f-md); cursor:pointer; width:100%; letter-spacing:2px; font-family:inherit; }
.settings-section-title { font-size:var(--f-sm); color:#fbbf24; font-weight:900; text-transform:uppercase; letter-spacing:3px; margin-bottom:8px; }
.settings-modal input[type=range] { -webkit-appearance:none; appearance:none; background:transparent; padding:0; border:none; width:100%; }
.settings-modal input[type=range]::-webkit-slider-runnable-track { height:8px; background:linear-gradient(90deg,#3b82f6,#6366f1); border-radius:99px; }
.settings-modal input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:22px; height:22px; background:#fbbf24; border-radius:50%; margin-top:-7px; cursor:pointer; box-shadow:0 0 12px rgba(251,191,36,0.6); }

/* Exit confirmation dialog (same visual family as settings-modal) */
.exit-modal { position:fixed; inset:0; background:rgba(0,0,0,0.82); display:flex; align-items:center; justify-content:center; z-index: var(--z-exit-confirm); padding:20px; backdrop-filter:blur(8px); animation:fadeIn .18s ease-out both; }
.exit-panel { background:linear-gradient(135deg,#160a0a,#2a1414); border:1px solid rgba(239,68,68,0.45); border-radius:var(--rad-lg); padding:var(--sp-xl) var(--sp-xl) var(--sp-lg); width:100%; max-width:calc(440px * var(--ui-scale)); box-shadow:0 30px 80px rgba(0,0,0,0.7), 0 0 60px rgba(239,68,68,0.25); animation: zin .28s both; text-align:center; }
.exit-icon { font-size:calc(52px * var(--ui-scale)); margin-bottom:var(--sp-sm); filter: drop-shadow(0 0 18px rgba(239,68,68,0.6)); }
.exit-title { font-size:var(--f-xl); font-weight:900; color:#fff; letter-spacing:3px; text-transform:uppercase; margin-bottom:var(--sp-sm); }
.exit-sub { font-size:var(--f-md); color:#fde8e8; margin-bottom:var(--sp-lg); line-height:1.5; }
.exit-actions { display:flex; gap:var(--sp-md); justify-content:center; flex-wrap:wrap; }
.exit-btn { font-family:inherit; border:none; border-radius:var(--rad-md); padding:var(--sp-md) var(--sp-xl); font-size:var(--f-md); font-weight:800; cursor:pointer; letter-spacing:1px; transition: transform .15s, box-shadow .2s; }
.exit-btn:hover { transform: translateY(-2px); }
.exit-btn.continue { background:linear-gradient(135deg,#3b82f6,#6366f1); color:#fff; box-shadow:0 8px 20px rgba(59,130,246,0.3); }
.exit-btn.quit { background:linear-gradient(135deg,#ef4444,#991b1b); color:#fff; box-shadow:0 8px 20px rgba(239,68,68,0.3); }
.exit-hint { font-size:var(--f-xs); color:#94a3b8; margin-top:var(--sp-md); font-style:italic; }

/* Vehicule Selector UI */
.veh-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(260px, 100%), 1fr)); gap: var(--sp-md); max-height: 56vh; overflow-y: auto; overflow-x:hidden; padding: var(--sp-sm); }
/* Lobby — mode solo : SHOWROOM split 45/55 favorise la vitrine vehicule (inspire ref). */
.veh-solo { display:grid; grid-template-columns: minmax(280px, 45%) minmax(380px, 55%); gap: var(--sp-xl); max-width: 100%; align-items: stretch; }
.veh-solo-left { display:flex; flex-direction:column; gap: var(--sp-md); padding: var(--sp-lg); background: rgba(4,8,20,0.5); border-radius: var(--rad-md); border: 1px solid rgba(255,255,255,0.06); justify-content:center; }
.veh-solo-right { display:flex; flex-direction:column; align-items:center; gap: var(--sp-sm); padding: var(--sp-lg) var(--sp-md); border-radius: var(--rad-md); position:relative; overflow:hidden; min-height: calc(400px * var(--ui-scale)); }
.veh-solo-art { font-size: calc(150px * var(--ui-scale)); line-height:1; filter: drop-shadow(0 8px 28px rgba(0,0,0,0.6)); animation: vBounce 3s ease-in-out infinite; }
.veh-solo-name { font-size: var(--f-xl); font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }
.veh-solo-desc { font-size: var(--f-sm); color:#94a3b8; font-style: italic; text-align:center; }
.veh-solo-badge { width:100%; display:flex; align-items:center; gap: var(--sp-sm); padding: var(--sp-sm) var(--sp-md); border-radius: var(--rad-sm); font-weight: 800; font-size: var(--f-sm); }
@media (max-width: 880px) { .veh-solo { grid-template-columns: 1fr; } .veh-solo-right { min-height: calc(280px * var(--ui-scale)); } }
.veh-card { background: rgba(15,23,42,0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--rad-md); padding: var(--sp-md); cursor: pointer; transition: all 0.2s; display:flex; align-items:center; gap: var(--sp-md); min-width:0; }
.veh-card:hover { background: rgba(255,255,255,0.1); border-color: #3b82f6; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
.veh-icon { font-size: var(--f-xxl); width: calc(50px * var(--ui-scale)); height: calc(50px * var(--ui-scale)); border-radius: var(--rad-sm); display:flex; align-items:center; justify-content:center; flex-shrink: 0; }
/* Modales : taille bornee par le viewport pour ne jamais deborder, scroll interne si le contenu deborde */
.exit-modal, .settings-modal { max-height: 100vh; }
.exit-panel, .settings-panel { max-height: 92vh; overflow-y: auto; }
/* SettingsModal : largeur bornee, jamais plus large que le viewport */
.settings-panel {
  width:min(calc(760px * var(--ui-scale)), 94vw);
  max-width:94vw;
}
.exit-panel { max-width: min(calc(460px * var(--ui-scale)), 92vw); }
@media (max-width: 720px) {
  .settings-panel { width:min(calc(520px * var(--ui-scale)), 94vw); }
}

<body>
<div id="native-splash" style="position:fixed;inset:0;background:#040b1a;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif;overflow:hidden;">
  <style>
    @keyframes nativeFadeOut { to { opacity: 0; visibility: hidden; transform: scale(1.05); } }
    @keyframes splZin { 0% { transform: scale(1.8) translateY(-20px); opacity:0; } 100% { transform: scale(1) translateY(0); opacity:1; } }
    @keyframes splFdu { 0% { transform: translateY(30px); opacity:0; letter-spacing: 12px; } 100% { transform: translateY(0); opacity:1; letter-spacing: 8px; } }
    #native-splash .icon { font-size:140px; animation: splZin .4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    #native-splash .text { margin-top:32px; font-size:32px; font-weight:900; color:#e2e8f0; text-transform:uppercase; animation: splFdu .4s cubic-bezier(0.2, 0.8, 0.2, 1) 0.1s both; text-align:center; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    #native-splash .sub { font-size:16px; color:#94a3b8; letter-spacing:4px; font-weight:600; display:block; margin-top:8px;}
  </style>
  <div id="splash-icon" class="icon"></div>
  <div class="text"><span id="splash-title"></span><span id="splash-sub" class="sub"></span></div>
  <script>
    (function(){
      const vars = [
        { icon: "🚀", text: "LARGAGE ORBITAL", sub: "DROP POD LOURD" },
        { icon: "🦅", text: "DÉPLOIEMENT", sub: "THUNDERHAWK" },
        { icon: "🤖", text: "ÉVEIL ANCIEN", sub: "DREADNOUGHT" },
        { icon: "🚙", text: "TRANSPORT", sub: "RHINO BLINDÉ" },
        { icon: "🚘", text: "VÉHICULE PRÊT", sub: "ASTON MARTIN DB5" },
        { icon: "🚤", text: "IMMERSION", sub: "LOTUS ESPRIT" },
        { icon: "🏍️", text: "LIAISON SÉCURISÉE", sub: "MOTO Q-BRANCH" },
        { icon: "🎒", text: "EXTRACTION", sub: "JETPACK" },
        { icon: "🛸", text: "SIMULATION", sub: "TANK ZIN" },
        { icon: "📻", text: "DUBSTEP", sub: "ARME MUSICALE" },
        { icon: "🏃", text: "SURCHARGE", sub: "SUPER SPRINT" },
        { icon: "🚀", text: "BOSS FIGHT", sub: "VAISSEAU MÈRE" },
        { icon: "⛏️", text: "SURVIE", sub: "PIOLET" },
        { icon: "🏹", text: "FURTIVITÉ", sub: "ARC À POULIES" },
        { icon: "🐆", text: "INSTINCT", sub: "TENUE JAGUAR" },
        { icon: "🔫", text: "COMBAT", sub: "FUSIL D'ASSAUT" },
        { icon: "🚗", text: "BUSINESS", sub: "VOITURE PDG" },
        { icon: "🚐", text: "LIVRAISON", sub: "FOURGONNETTE" },
        { icon: "🚛", text: "FRET", sub: "CAMION LOURD" },
        { icon: "🚜", text: "ENTREPÔT", sub: "ÉLÉVATEUR" }
      ];
      try {
        const last = localStorage.getItem('mb_last_intro') || "";
        let available = vars.filter(v => v.sub !== last);
        if(available.length === 0) available = vars;
        const chosen = available[Math.floor(Math.random() * available.length)];
        localStorage.setItem('mb_last_intro', chosen.sub);
        document.getElementById('splash-icon').innerText = chosen.icon;
        document.getElementById('splash-title').innerText = chosen.text;
        document.getElementById('splash-sub').innerText = chosen.sub;
      } catch(e) {}
    })();
  </script>
</div>
<div id="root"></div>
<script src="assets/renderer.js"></script>
</body>
